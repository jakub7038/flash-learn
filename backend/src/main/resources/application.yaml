spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flashlearn}
    username: ${SPRING_DATASOURCE_USERNAME:flashlearn_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_please}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_change_in_production}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
